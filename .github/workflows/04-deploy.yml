name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["03 Build Artifact Workflow"]
    types: [completed]

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifact

      - name: Show downloaded files
        run: ls -R downloaded-artifact

      - name: Load Docker image
        run: docker load --input "downloaded-artifact/${IMAGE_TAR}"

      - name: Recreate image tag from build run
        id: image-tag
        run: |
          BUILD_DATE="$(echo "${{ github.event.workflow_run.created_at }}" | cut -dT -f1)"
          IMAGE_TAG="${BUILD_DATE}-${{ github.event.workflow_run.id }}"
          echo "Recreated IMAGE TAG: $IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Start container
        run: |
          echo "Starting container with image: ${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

      # ✅ NEW: show running containers
      - name: Show running containers
        run: docker ps

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            RESPONSE=$(curl --silent "http://127.0.0.1:${APP_PORT}/health" || true)

            if [ -n "$RESPONSE" ]; then
              echo "Health endpoint response:"
              echo "$RESPONSE"
              exit 0
            fi

            echo "Waiting for app to become ready..."
            sleep 2
          done

          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true